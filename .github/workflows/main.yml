name: Build GosseMessage APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore gossemessage-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias gossemessage -storepass GossePass2026 -keypass GossePass2026 -dname "CN=GosseMessage, O=Gosse, C=RU"

      - name: Build Release APK
        run: |
          source $HOME/.cargo/env
          ./gradlew assembleScRelease \
            -Pandroid.injected.signing.store.file=gossemessage-keystore.jks \
            -Pandroid.injected.signing.store.password=GossePass2026 \
            -Pandroid.injected.signing.key.alias=gossemessage \
            -Pandroid.injected.signing.key.password=GossePass2026

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find app/build/outputs -name "*.apk" -type f
          echo "=== APK directory structure ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || true
          ls -la app/build/outputs/apk/sc/ 2>/dev/null || true
          ls -la app/build/outputs/apk/sc/release/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GosseMessage-APK
          path: app/build/outputs/apk/**/*.apk
